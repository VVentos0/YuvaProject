name: Deploy to VDS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: yuva-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack release
        run: |
          tar \
            --exclude='./.git' \
            --exclude='./node_modules' \
            --exclude='./.env' \
            --exclude='./images/tree.gif' \
            --exclude='./images/birdan.gif' \
            --exclude='./images/tree-animated-hq.webp' \
            --exclude='./images/birdan-animated-hq.webp' \
            --exclude='./images/tree-optimized.webp' \
            --exclude='./images/birdan-optimized.webp' \
            --exclude='./images/background.jpg' \
            --exclude='./images/tree.png' \
            --exclude='./images/tree-poster.webp' \
            -czf /tmp/yuva-release.tar.gz .

      - name: Configure SSH
        env:
          VDS_SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
          VDS_HOST: ${{ secrets.VDS_HOST }}
        run: |
          test -n "$VDS_SSH_KEY" || { echo "Missing GitHub secret: VDS_SSH_KEY" >&2; exit 1; }
          test -n "$VDS_HOST" || { echo "Missing GitHub secret: VDS_HOST" >&2; exit 1; }
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VDS_SSH_KEY" > ~/.ssh/yuva_deploy
          chmod 600 ~/.ssh/yuva_deploy
          ssh-keyscan -H "$VDS_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
          VDS_PORT: ${{ secrets.VDS_PORT }}
        run: |
          test -n "$VDS_USER" || { echo "Missing GitHub secret: VDS_USER" >&2; exit 1; }
          for i in 1 2 3; do
            scp -P "${VDS_PORT:-22}" -i ~/.ssh/yuva_deploy /tmp/yuva-release.tar.gz \
              "$VDS_USER@$VDS_HOST:/tmp/yuva-release.tar.gz" && exit 0
            echo "SCP upload failed, retry $i/3" >&2
            sleep $((i * 8))
          done
          exit 1

      - name: Deploy on VDS
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_USER: ${{ secrets.VDS_USER }}
          VDS_PORT: ${{ secrets.VDS_PORT }}
          VDS_PROJECT_DIR: ${{ secrets.VDS_PROJECT_DIR }}
        run: |
          ssh -p "${VDS_PORT:-22}" -i ~/.ssh/yuva_deploy "$VDS_USER@$VDS_HOST" "VDS_PROJECT_DIR='${VDS_PROJECT_DIR}' bash -s" <<'REMOTE'
          set -euo pipefail

          PROJECT_DIR="${VDS_PROJECT_DIR:-/home/admin/YuvaProject}"
          RELEASE_ARCHIVE="/tmp/yuva-release.tar.gz"

          retry() {
            attempts="$1"
            shift
            delay=8
            n=1
            until "$@"; do
              if [ "$n" -ge "$attempts" ]; then
                return 1
              fi
              echo "Command failed, retry $n/$attempts: $*" >&2
              sleep "$delay"
              n=$((n + 1))
              delay=$((delay * 2))
            done
          }

          safe_docker_cleanup() {
            docker builder prune -af || true
            docker image prune -af || true
            docker container prune -f || true
          }

          mkdir -p "$PROJECT_DIR"
          cd "$PROJECT_DIR"

          if [ ! -f .env ]; then
            echo "Missing $PROJECT_DIR/.env on VDS. Refusing to deploy without production env." >&2
            exit 1
          fi

          echo "Disk before cleanup:"
          df -h "$PROJECT_DIR" /tmp || true
          docker system df || true
          rm -f /tmp/yuva-release.tar.gz.partial
          safe_docker_cleanup

          find "$PROJECT_DIR" -mindepth 1 -maxdepth 1 ! -name ".env" -exec rm -rf {} +
          tar -xzf "$RELEASE_ARCHIVE" -C "$PROJECT_DIR"
          rm -f "$RELEASE_ARCHIVE"

          retry 5 docker compose pull mongo
          retry 3 docker compose up -d --build
          safe_docker_cleanup

          for i in $(seq 1 45); do
            if curl -fsS --max-time 5 http://127.0.0.1:3000/api/health; then
              docker compose ps
              exit 0
            fi
            sleep 2
          done

          docker compose ps
          docker compose logs --tail=120 app
          docker compose logs --tail=120 mongo
          exit 1
          REMOTE
