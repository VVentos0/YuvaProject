<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yuva Database</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101412;
        color: #f6efe5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 18px;
        background:
          radial-gradient(circle at 20% 15%, rgba(201, 173, 110, 0.2), transparent 28%),
          radial-gradient(circle at 82% 12%, rgba(111, 145, 125, 0.18), transparent 32%),
          linear-gradient(180deg, #121714, #0d100f);
      }

      form {
        width: min(410px, 100%);
        display: grid;
        gap: 15px;
        border: 1px solid rgba(246, 239, 229, 0.14);
        border-radius: 8px;
        padding: 26px;
        background:
          linear-gradient(145deg, rgba(246, 239, 229, 0.08), rgba(246, 239, 229, 0.025)),
          rgba(255, 255, 255, 0.035);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.28);
      }

      h1 {
        margin: 0 0 4px;
        font-size: 32px;
        line-height: 1;
      }

      label {
        display: grid;
        gap: 7px;
        color: rgba(246, 239, 229, 0.74);
        font-size: 13px;
        font-weight: 800;
      }

      input,
      button {
        min-height: 44px;
        border: 1px solid rgba(246, 239, 229, 0.16);
        border-radius: 8px;
        font: inherit;
        padding: 0 12px;
      }

      input {
        background: #171d1a;
        color: #f6efe5;
        outline: none;
      }

      input:focus {
        border-color: rgba(201, 173, 110, 0.7);
        box-shadow: 0 0 0 3px rgba(201, 173, 110, 0.12);
      }

      button {
        margin-top: 4px;
        cursor: pointer;
        background: #c9ad6e;
        border-color: #c9ad6e;
        color: #14130f;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <form action="/admin-login" method="post">
      <h1>Yuva Database</h1>
      <label>
        Kullanıcı
        <input name="username" autocomplete="username" required />
      </label>
      <label>
        Şifre
        <input name="password" type="password" autocomplete="current-password" required />
      </label>
      <label>
        Güvenlik Kodu
        <input name="totp" inputmode="numeric" pattern="[0-9]{6}" autocomplete="one-time-code" placeholder="2FA aktifse gerekli" />
      </label>
      <button type="submit">Giriş</button>
    </form>
  </body>
</html>
