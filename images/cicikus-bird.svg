<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <style>
    svg {
      background: transparent;
      shape-rendering: crispEdges;
      image-rendering: pixelated;
      overflow: visible;
    }

    .bird {
      animation: birdBob 760ms steps(4, end) infinite;
      transform-origin: 48px 49px;
    }

    .wing-left {
      animation: flapLeft 420ms steps(4, end) infinite;
      transform-box: fill-box;
      transform-origin: 61px 39px;
    }

    .wing-right {
      animation: flapRight 420ms steps(4, end) infinite;
      transform-box: fill-box;
      transform-origin: 35px 40px;
    }

    .cheek {
      animation: cheekBlink 1680ms steps(1, end) infinite;
    }

    @keyframes birdBob {
      0%, 100% { transform: translateY(1px); }
      50% { transform: translateY(-2px); }
    }

    @keyframes flapLeft {
      0%, 100% { transform: rotate(24deg) translate(0, 2px); }
      50% { transform: rotate(-32deg) translate(-2px, -7px); }
    }

    @keyframes flapRight {
      0%, 100% { transform: rotate(-18deg) translate(0, 2px); }
      50% { transform: rotate(28deg) translate(2px, -5px); }
    }

    @keyframes cheekBlink {
      0%, 88%, 100% { opacity: 0.92; }
      89%, 91% { opacity: 0.55; }
    }
  </style>

  <g class="bird">
    <g class="wing-right" opacity="0.82">
      <path d="M35 35h-7v4h-6v6h-5v8h5v5h8v-5h6v-9h5v-6h-6z" fill="#d6dc45"/>
