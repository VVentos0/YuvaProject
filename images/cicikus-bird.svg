      <path d="M18 55h10v5H18z" fill="#2f8f70"/>
      <path d="M22 45h7v3h-7zM24 53h7v3h-7z" fill="#665b2a" opacity="0.55"/>
    </g>

    <g class="wing-left" opacity="0.88">
