limit_req_zone $binary_remote_addr zone=yuva_letters:10m rate=6r/m;
limit_req_zone $binary_remote_addr zone=yuva_admin_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=yuva_admin_api:10m rate=30r/m;

server {
    listen 80;
    listen [::]:80;
    server_name www.yuvarchive.com;
    return 301 https://yuvarchive.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name yuvarchive.com database.yuvarchive.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.yuvarchive.com;

    ssl_certificate /etc/letsencrypt/live/yuvarchive.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yuvarchive.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://yuvarchive.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name yuvarchive.com;

    client_max_body_size 128k;

    ssl_certificate /etc/letsencrypt/live/yuvarchive.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yuvarchive.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = /api/letters {
        limit_req zone=yuva_letters burst=8 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name database.yuvarchive.com;

    client_max_body_size 128k;

    ssl_certificate /etc/letsencrypt/live/yuvarchive.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yuvarchive.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = /admin-login {
        limit_req zone=yuva_admin_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/admin/ {
        limit_req zone=yuva_admin_api burst=30 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
