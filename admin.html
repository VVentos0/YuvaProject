<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yuva Database</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101412;
        color: #f6efe5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(180deg, rgba(16, 20, 18, 0.92), rgba(16, 20, 18, 0.98)),
          radial-gradient(circle at 18% 8%, rgba(201, 173, 110, 0.18), transparent 28%),
          radial-gradient(circle at 84% 18%, rgba(111, 145, 125, 0.16), transparent 30%),
          #101412;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .shell {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 46px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 0 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 46px);
        line-height: 1;
      }

      .logout {
        display: inline-grid;
        min-height: 38px;
        place-items: center;
        border: 1px solid rgba(246, 239, 229, 0.16);
        border-radius: 8px;
        padding: 0 14px;
        background: rgba(246, 239, 229, 0.06);
        color: #f6efe5;
        font-weight: 800;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin: 8px 0 18px;
      }

      .stat {
        min-height: 96px;
        border: 1px solid rgba(246, 239, 229, 0.12);
        border-radius: 8px;
        padding: 16px;
        background:
          linear-gradient(145deg, rgba(246, 239, 229, 0.08), rgba(246, 239, 229, 0.025)),
          rgba(255, 255, 255, 0.02);
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.16);
      }

      .eyebrow {
        color: #c9ad6e;
        font-size: 15px;
        font-weight: 900;
        letter-spacing: 0;
      }

      .stat strong {
        display: block;
        margin-top: 10px;
        font-size: clamp(28px, 4vw, 42px);
        line-height: 0.95;
      }

      .panel {
        border: 1px solid rgba(246, 239, 229, 0.12);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.035);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.18);
        overflow: hidden;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        padding: 14px;
        border-bottom: 1px solid rgba(246, 239, 229, 0.1);
        background: rgba(0, 0, 0, 0.16);
      }

      select,
      button,
      input,
      textarea {
        border: 1px solid rgba(246, 239, 229, 0.16);
        border-radius: 8px;
        background: #171d1a;
        color: #f6efe5;
        font: inherit;
      }

      select,
      button,
      input {
        min-height: 40px;
        padding: 0 12px;
      }

      button {
        cursor: pointer;
        background: #c9ad6e;
        border-color: #c9ad6e;
        color: #14130f;
        font-weight: 900;
      }

      .danger-button {
        background: #b95b58;
        border-color: #b95b58;
        color: #fff8f0;
      }

      .ghost-button {
        background: rgba(246, 239, 229, 0.06);
        border-color: rgba(246, 239, 229, 0.16);
        color: #f6efe5;
      }

      .status {
        margin-left: auto;
        color: rgba(246, 239, 229, 0.62);
        font-size: 14px;
      }

      .letters {
        display: grid;
        gap: 10px;
        padding: 14px;
      }

      article {
        display: grid;
        gap: 12px;
        border: 1px solid rgba(246, 239, 229, 0.1);
        border-radius: 8px;
        background: rgba(246, 239, 229, 0.045);
        padding: 16px;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        color: rgba(246, 239, 229, 0.72);
        font-size: 13px;
      }

      .meta span {
        border: 1px solid rgba(246, 239, 229, 0.1);
        border-radius: 999px;
        padding: 5px 8px;
        background: rgba(0, 0, 0, 0.14);
      }

      .meta .recipient {
        border-color: rgba(201, 173, 110, 0.38);
        color: #f8d98e;
      }

      .body {
        margin: 0;
        color: #fbf5ec;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        line-height: 1.62;
      }

      .letter-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .edit-form {
        display: none;
        gap: 10px;
      }

      article.is-editing .edit-form {
        display: grid;
      }

      article.is-editing .body,
      article.is-editing .letter-actions {
        display: none;
      }

      .edit-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 150px;
        gap: 10px;
      }

      textarea {
        width: 100%;
        min-height: 180px;
        resize: vertical;
        padding: 12px;
        line-height: 1.55;
      }

      .empty {
        padding: 38px 18px;
        border: 1px dashed rgba(246, 239, 229, 0.2);
        border-radius: 8px;
        color: rgba(246, 239, 229, 0.64);
        text-align: center;
      }

      @media (max-width: 720px) {
        .shell {
          width: min(100vw - 20px, 1180px);
          padding-top: 18px;
        }

        header {
          align-items: flex-start;
          flex-direction: column;
        }

        .stats,
        .edit-row {
          grid-template-columns: 1fr;
        }

        .toolbar {
          align-items: stretch;
          flex-direction: column;
        }

        .status {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <h1>Yuva Database</h1>
        <a class="logout" href="/logout">Çıkış</a>
      </header>

      <section class="stats" aria-label="Mektup özetleri">
        <div class="stat">
          <span class="eyebrow">Toplam</span>
          <strong id="count">-</strong>
        </div>
        <div class="stat">
          <span class="eyebrow">Sedo</span>
          <strong id="sedoCount">-</strong>
        </div>
        <div class="stat">
          <span class="eyebrow">İro</span>
          <strong id="iroCount">-</strong>
        </div>
      </section>

      <main class="panel">
        <div class="toolbar">
          <select id="recipient" aria-label="Alıcı filtresi">
            <option value="">Tüm mektuplar</option>
            <option value="SEDO">SEDO</option>
            <option value="IRO">IRO</option>
          </select>
          <button id="refresh" type="button">Yenile</button>
          <span class="status" id="status"></span>
        </div>
        <section class="letters" id="letters"></section>
      </main>

      <main class="panel">
        <div class="toolbar">
          <strong>Yuva Sohbeti</strong>
          <button id="refreshChat" type="button">Sohbeti Yenile</button>
          <button id="reportedChat" type="button">Reported</button>
          <button id="allChat" type="button">Tümü</button>
          <span class="status" id="chatStatus"></span>
        </div>
        <section class="letters" id="chatModeration"></section>
      </main>
    </div>
    <script src="/admin.js"></script>
  </body>
</html>
